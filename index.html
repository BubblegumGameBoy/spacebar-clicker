<html lang="ja">

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
  html,body,#field{
    touch-action:manipulation; /* シングルタップのみ、長押し挙動ブロック */
    -webkit-user-select:none;
  }
  :root{
    --panel:#161b21; --panel2:#1e252e; --line:#2c3742;
    --gold:#f3c34a; --txt:#d7e0e8; --sub:#8a99a8;
    --accent:#7fae6b;
  }
  html,body{ height:100%; }
  body{
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:#0c0f13; color:var(--txt); overflow:hidden; user-select:none;
    display:flex; flex-direction:column;
    height:100vh; height:100dvh; /* dvh = ブラウザUI除いた実際の表示高さ */
  }
  /* ===== BATTLEFIELD ===== */
  #field{
    position:relative; width:100%; height:62vh; overflow:hidden;
    cursor:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><g transform='rotate(45 16 16)'><rect x='14.5' y='2' width='3' height='17' rx='1' fill='%23dfe7ee' stroke='%23222' stroke-width='1'/><polygon points='16,0 14.5,3 17.5,3' fill='%23f4f9ff' stroke='%23222' stroke-width='.6'/><rect x='10' y='18.5' width='12' height='3' rx='1.2' fill='%23b88a2e' stroke='%23222' stroke-width='1'/><rect x='14.6' y='21.5' width='2.8' height='7' rx='1.2' fill='%236b4a1d' stroke='%23222' stroke-width='1'/><circle cx='16' cy='30' r='1.8' fill='%23f3c34a' stroke='%23222' stroke-width='.8'/></g></svg>") 4 4, crosshair;
    flex:0 0 auto;
  }
  #bgImg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    object-position:bottom; z-index:0; pointer-events:none;}

  /* ===== BOSS ===== */
  #boss{position:absolute; right:8%; bottom:14%; height:62%; max-width:48%; transform-origin:bottom center;
    z-index:5; pointer-events:none;}
  #boss img{height:100%; width:auto; max-width:100%; object-fit:contain; object-position:bottom; display:block; animation:bob 2.6s ease-in-out infinite;}
  /* wide bosses (e.g. ~2:1 aspect) need more horizontal room so they don't render tiny */
  #boss.wide{height:46%; max-width:72%; right:2%;}
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-1%) rotate(-.4deg);} }
  #boss.hit img{ animation:bob 2.6s ease-in-out infinite, shake .15s; filter:brightness(1.8) saturate(1.4); }
  @keyframes shake{ 0%{transform:translate(0,0);}25%{transform:translate(-6px,2px);}50%{transform:translate(5px,-1px);}75%{transform:translate(-3px,1px);}100%{transform:translate(0,0);} }
  #boss.dying img{ animation:die .7s forwards; }
  @keyframes die{ to{ transform:translateY(8%) rotate(12deg) scale(.85); opacity:0; filter:saturate(0) brightness(.4);} }

  #bossPlate{position:absolute; top:5%; left:50%; transform:translateX(-50%); width:min(440px,72%); z-index:8;
    text-align:center; pointer-events:none;}
  #bossName{font-size:clamp(14px,2.4vw,20px); font-weight:700; letter-spacing:.04em;
    text-shadow:0 2px 4px #000,0 0 8px rgba(0,0,0,.7); color:#f0e6d2;}
  #bossSub{font-size:11px; color:var(--sub); margin-bottom:4px;}
  .hpwrap{height:16px; border:2px solid #5a4636; border-radius:9px; background:#1a120c;
    box-shadow:inset 0 1px 3px #000, 0 1px 2px rgba(0,0,0,.5); overflow:hidden; position:relative;}
  #hpfill{height:100%; width:100%;
    background:linear-gradient(#e8584a,#9c1f1f); transition:width .18s linear;}
  #hptext{position:absolute; inset:0; font-size:10px; line-height:14px; font-weight:600;
    text-shadow:0 1px 2px #000; color:#fff;}

  /* ===== UNITS ===== */
  .unit-sprite{position:absolute; height:10%; z-index:6; transform-origin:bottom center;
    animation:ubob 1.6s ease-in-out infinite; will-change:transform;}
  .unit-sprite img{height:100%; width:auto; display:block; image-rendering:pixelated;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.55));}
  .unit-sprite .badge{position:absolute; top:-13px; left:50%; transform:translateX(-50%);
    font-size:10px; font-weight:700; color:#fff;
    background:rgba(0,0,0,.6); border:1px solid var(--line); border-radius:8px; padding:0 5px; white-space:nowrap;}
  @keyframes ubob{ 0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);} }
  /* flying units drift on a slow loop; attack anim goes on the inner img so the float never stops */
  .unit-sprite.fly{ animation:floatFly 3.6s ease-in-out infinite; }
  @keyframes floatFly{ 0%{transform:translate(0,0);} 25%{transform:translate(5px,-9px);}
    50%{transform:translate(0,-16px);} 75%{transform:translate(-5px,-8px);} 100%{transform:translate(0,0);} }
  .unit-sprite.melee.attacking{ animation:lunge .3s ease; }
  @keyframes lunge{ 0%{transform:translateX(0);}40%{transform:translateX(8px);}100%{transform:translateX(0);} }
  .unit-sprite.ranged.attacking{ animation:rfire .3s ease; }
  @keyframes rfire{ 0%{transform:translateY(0);}40%{transform:translateY(-5px);}100%{transform:translateY(0);} }
  .unit-sprite.fly.attacking{ animation:floatFly 3.6s ease-in-out infinite; }
  .unit-sprite.fly.attacking img{ animation:rfire .3s ease; }

  .proj{position:absolute; z-index:8; font-size:18px; pointer-events:none; will-change:transform;}

  /* per-unit attack effects */
  .atk-fx{position:absolute;z-index:8;pointer-events:none;border-radius:50%;}
  .atk-fx.slash{width:72px;height:7px;border-radius:4px;
    background:linear-gradient(90deg,transparent,#ff5533 20%,#ffcc66);
    animation:sfx .28s ease-out forwards;}
  @keyframes sfx{0%{opacity:1;transform:translate(-50%,-50%) scaleX(0) rotate(-15deg);}
    100%{opacity:0;transform:translate(-50%,-50%) scaleX(1) rotate(-15deg);}}
  .atk-fx.shock{width:58px;height:58px;border:3px solid #ffdd22;
    box-shadow:0 0 6px #ffdd22;animation:wfx .38s ease-out forwards;}
  @keyframes wfx{0%{opacity:1;transform:translate(-50%,-50%) scale(0);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2);}}
  .atk-fx.magic{width:46px;height:46px;border:3px solid #bf60ff;
    box-shadow:0 0 10px #bf60ff;animation:mfx .48s ease-out forwards;}
  @keyframes mfx{0%{opacity:1;transform:translate(-50%,-50%) scale(0) rotate(0deg);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.8) rotate(120deg);}}

  /* player click slash: bright arc streak, random angle set via --ang */
  .clickfx{position:absolute;z-index:8;pointer-events:none;width:90px;height:90px;}
  .clickfx::before{content:"";position:absolute;inset:0;border-radius:50%;
    border:4px solid transparent;
    border-top-color:#fff;border-right-color:#ffe96b;
    filter:drop-shadow(0 0 6px rgba(255,235,120,.9));
    animation:clkarc .22s ease-out forwards;}
  @keyframes clkarc{
    0%{opacity:0;transform:rotate(calc(var(--ang) - 120deg)) scale(.5);}
    25%{opacity:1;}
    100%{opacity:0;transform:rotate(calc(var(--ang) + 60deg)) scale(1.15);}}
  .clickfx.crit{width:130px;height:130px;}
  .clickfx.crit::before{border-width:6px;border-top-color:#ff8a5a;border-right-color:#ffd24a;}
  .dmg{position:absolute; z-index:9; font-weight:800; pointer-events:none;
    text-shadow:0 1px 2px #000,0 0 4px rgba(0,0,0,.6); animation:flo .8s ease-out forwards; white-space:nowrap;}
  @keyframes flo{ 0%{transform:translate(-50%,0) scale(.6); opacity:0;}
    20%{transform:translate(-50%,-14px) scale(1.1); opacity:1;}
    100%{transform:translate(-50%,-52px) scale(1); opacity:0;} }
  .dmg.click{color:#ffe14a; font-size:22px;} .dmg.crit{color:#ff5a4a; font-size:26px;}
  .dmg.unit{color:#e8eef2; font-size:13px;}
  .particle{position:absolute; z-index:8; width:6px; height:6px; border-radius:50%;
    background:var(--gold); pointer-events:none;}

  /* ===== KILL BANNER ===== */
  #killBanner{position:absolute; top:18%; left:50%; transform:translateX(-50%); z-index:20;
    background:rgba(10,8,4,.82); border:1px solid #f3c34a; border-radius:10px;
    padding:8px 20px; text-align:center; pointer-events:none;
    opacity:0; transition:opacity .25s;}
  #killBanner.on{opacity:1;}
  #killBanner .kb-title{font-size:clamp(18px,4vw,28px); font-weight:900; color:#ffd24a; letter-spacing:.06em;}
  #killBanner .kb-gold{font-size:14px; color:var(--gold); margin-top:2px;}

  /* ===== BOSS NAV BUTTONS ===== */
  #nextBossBtn,#prevBossBtn{display:none; margin-top:5px; padding:5px 10px; color:#fff;
    border-radius:7px; font-weight:700; font-size:12px; cursor:pointer; width:100%;}
  #nextBossBtn{background:#7a4ab0; border:1px solid #9a6ad0;}
  #nextBossBtn:hover{background:#8a5ac0;}
  #prevBossBtn{background:var(--panel2); border:1px solid var(--line); color:var(--txt);}
  #prevBossBtn:hover{border-color:var(--accent);}

  /* ===== HUD ===== */
  #hud{position:absolute; top:10px; left:10px; z-index:10;
    background:rgba(14,18,22,.82); border:1px solid var(--line); border-radius:10px;
    padding:8px 12px; font-size:12px; backdrop-filter:blur(3px); min-width:150px;}
  #hud .row{display:flex; justify-content:space-between; gap:14px; padding:1px 0;}
  #hud .k{color:var(--sub);} #hud .v{font-weight:700;}
  #goldBig{color:var(--gold); font-size:16px;}
  #stageTag{position:absolute; top:10px; right:10px; z-index:10; text-align:right;
    background:rgba(14,18,22,.82); border:1px solid var(--line); border-radius:10px; padding:6px 12px; font-size:12px;}
  #stageTag b{font-size:16px; color:var(--accent);}
  #comboTag{position:absolute; top:48%; left:14px; z-index:10; transform:translateY(-50%);
    font-weight:800; font-size:clamp(18px,4vw,34px); color:#ffd24a; text-shadow:0 2px 6px #000;
    opacity:0; transition:opacity .2s;}
  #comboTag.on{opacity:1;}
  #comboTag small{display:block; font-size:11px; color:var(--sub);}

  /* ===== CONTROL DECK ===== */
  #deck{flex:1 1 auto; display:flex; flex-direction:row; background:var(--panel); border-top:2px solid var(--line); min-height:0;}
  #deckMain{flex:1 1 auto; display:flex; flex-direction:column; min-width:0;}
  /* PC: ad lives in a fixed right column, fully visible without scrolling */
  #adSide{flex:0 0 320px; display:none; align-items:center; justify-content:center;
    border-left:1px solid var(--line); background:var(--panel2); padding:10px; overflow:hidden;}
  @media(min-width:1024px){ #adSide{display:flex;} }
  #tabs{display:flex; flex:0 0 auto;}
  .tab{flex:1; padding:10px; text-align:center; font-weight:700; font-size:14px; cursor:pointer;
    background:var(--panel2); color:var(--sub); border-right:1px solid var(--line); border-bottom:2px solid transparent;}
  .tab.active{color:var(--txt); background:var(--panel); border-bottom-color:var(--accent);}
  #panels{flex:1 1 auto; overflow-y:auto; padding:10px; min-height:0;}
  .pane{display:none; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:8px;}
  .pane.active{display:grid;}
  .card{background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 11px;
    cursor:pointer; transition:.1s; display:flex; flex-direction:column; gap:3px;}
  .card:not(.dis):hover{border-color:var(--accent); transform:translateY(-1px);}
  .card.dis{opacity:.5; cursor:not-allowed;}
  .card .top{display:flex; justify-content:space-between; align-items:baseline;}
  .card .nm{font-weight:700; font-size:14px;}
  .card .lv{font-size:11px; color:var(--accent); font-weight:700;}
  .card .desc{font-size:10px; color:var(--sub); opacity:.85; line-height:1.3;}
  .card .ef{font-size:11px; color:var(--sub);}
  .card .cost{font-size:13px; font-weight:700; color:var(--gold); margin-top:2px;}
  .card.dis .cost{color:#a06a4a;}
  #adBox{margin:14px auto 6px; text-align:center; max-width:100%; overflow:hidden;
    min-height:0;}
  #adBox iframe,#adBox img{max-width:100% !important;}
  #prestigeBtn{display:block; width:100%; margin-top:10px; padding:9px;
    background:#3a2150; color:#e7d6ff; border:1px solid #6a4a90;
    border-radius:8px; font-weight:700; cursor:pointer; font-size:13px;}
  #prestigeBtn:disabled{opacity:.45; cursor:not-allowed;}

  #modal{position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:50; display:none;
    align-items:center; justify-content:center;}
  #modal.on{display:flex;}
  .mbox{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; max-width:340px; text-align:center;}
  .mbox h3{margin-bottom:8px; color:#e7d6ff;}
  .mbox p{font-size:13px; color:var(--sub); margin-bottom:16px; line-height:1.5;}
  .mbox button{padding:9px 18px; margin:0 5px; border-radius:8px; border:none; font-weight:700; cursor:pointer;}
  .mbox .yes{background:#7a4ab0; color:#fff;} .mbox .no{background:var(--panel2); color:var(--txt); border:1px solid var(--line);}

  @media(max-width:680px){
    #field{height:50vh;} .pane{grid-template-columns:1fr;}
    #hud{font-size:11px; min-width:120px;}
  }
</style>
</head>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const field=$("#field"), bossEl=$("#boss"), bossImg=$("#bossImg");
function fmt(n){ n=Math.floor(n);
  const u=["","K","M","B","T","Qa","Qi"]; let i=0;
  while(n>=1000&&i<u.length-1){ n/=1000; i++; }
  return (i===0?n:(n<10?n.toFixed(2):n<100?n.toFixed(1):Math.floor(n)))+u[i];
}
function rnd(a,b){return a+Math.random()*(b-a);}

/* ===== SOUND ===== */
let _ac=null;
function ac(){ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); return _ac; }
function snd(freq,type,dur,vol=0.3,decay=0.8){
  try{
    const ctx=ac();
    if(ctx.state==="suspended") ctx.resume();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  }catch(e){}
}
// noise burst for slash "swish" — white noise through a falling bandpass
function sndSwish(vol=0.22,dur=0.09,freq=2600){
  try{
    const ctx=ac(); if(ctx.state==="suspended") ctx.resume();
    const len=ctx.sampleRate*dur, buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type="bandpass"; f.Q.value=1.2;
    f.frequency.setValueAtTime(freq,ctx.currentTime);
    f.frequency.exponentialRampToValueAtTime(freq*0.35,ctx.currentTime+dur);
    const g=ctx.createGain(); g.gain.value=vol;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start();
  }catch(e){}
}
function sndClick(){ sndSwish(0.2,0.08,2400); snd(95,'square',0.07,0.22); }
function sndCrit(){ sndSwish(0.3,0.12,3200); snd(70,'square',0.12,0.3); snd(480,'sawtooth',0.1,0.18); }
function sndUnitHit(){ snd(120,'square',0.04,0.08); }
function sndKill(){ [200,300,400].forEach((f,i)=>setTimeout(()=>snd(f,'sine',0.18,0.2),i*60)); }
function sndLevelUp(){ [300,400,500,650].forEach((f,i)=>setTimeout(()=>snd(f,'sine',0.15,0.25),i*80)); }
function sndGold(){ snd(440,'sine',0.08,0.12); }

const BOSS=[
 {img:"boss01_rat.webp",name:"下水の魔鼠 ラトキン"},
 {img:"boss02_nightwing.webp",name:"夜翼の影 ノクターン"},
 {img:"boss03_sanddweller.png",name:"砂漠の徘徊者 ザルファク"},
 {img:"boss04_blob.webp",name:"蠢く粘塊 グロブス"},
 {img:"boss05_hunter.webp",name:"深淵の狩人 ヴォルグ"},
 {img:"boss06_flame.webp",name:"焔霊 イグニス"},
 {img:"boss07_skyfiend.webp",name:"天空の鬼神 アエロス"},
 {img:"boss08_hound.webp",name:"時喰いの猟犬 クロノファング"},
 {img:"boss09_beast.webp",name:"極北の獣神 ボレアス"},
 {img:"boss10_stormgod.webp",name:"嵐の古神 ストラトス"},
 {img:"boss11_shantak.webp",name:"終焉の魔鳥 シャンタク",wide:true},
];

// dmg = per-hit damage at level 0.  DPS = dmg/iv.  Upgrades: dmg*(1+0.9*ulvl)
// pos = fixed battlefield position (left/bottom %) to avoid overlap
const UNITS=[
 {id:"farmer",  jp:"ファーマー", sprite:"unit_farmer.png",  base:25,   gold:true, iv:1.5, pos:{l:34,b:18}},
 {id:"sword",  jp:"剣士",        sprite:"unit_sword.png",  base:80,    dmg:2,     iv:1.0, ranged:false, fx:"slash", pos:{l:42,b:12}},
 {id:"arch",   jp:"弓兵",        sprite:"unit_arch.png",   base:600,   dmg:6,     iv:1.2, ranged:true,  proj:"➳",   pos:{l:31,b:14}, flip:true},
 {id:"villager",jp:"村人",      sprite:"unit_villager.png",base:1500, gold:true, iv:1.2, pos:{l:45,b:21}},
 {id:"heavy",  jp:"重装兵",      sprite:"unit_heavy.png",  base:3500,  dmg:18,    iv:1.5, ranged:false, fx:"shock", pos:{l:48,b:14}},
 {id:"mage",   jp:"魔導士",      sprite:"unit_mage.png",   base:20000, dmg:60,    iv:2.0, ranged:true,  proj:"✦", fx:"magic", pos:{l:20,b:17}, flip:true},
 {id:"knight", jp:"騎士",        sprite:"unit_knight.png", base:100000,dmg:90,    iv:1.0, ranged:false, fx:"slash", pos:{l:54,b:11}},
 {id:"paladin",jp:"聖騎士",      sprite:"unit_paladin.png",base:500000,dmg:180,   iv:0.9, ranged:false, fx:"shock", pos:{l:37,b:11}},
 {id:"elf",    jp:"エルフの射手",sprite:"unit_elf.png",    base:2.5e6, dmg:600,   iv:1.2, ranged:true,  proj:"➳",   pos:{l:25,b:20}, flip:true},
 {id:"warlock",jp:"黒魔術師",    sprite:"unit_warlock.png",base:12e6,  dmg:2600,  iv:2.0, ranged:true,  proj:"✦", fx:"magic", pos:{l:13,b:20}, flip:true},
 {id:"dark",   jp:"暗黒騎士",    sprite:"unit_dark.png",   base:60e6,  dmg:3200,  iv:1.0, ranged:false, fx:"slash", pos:{l:60,b:13}},
 {id:"dragong",jp:"翠竜",        sprite:"unit_dragong.png",base:300e6, dmg:14000, iv:1.8, ranged:true,  proj:"🔥",  pos:{l:6, b:46}, fly:true},
 {id:"dragonp",jp:"紫竜",        sprite:"unit_dragonp.png",base:1.5e9, dmg:36000, iv:1.8, ranged:true,  proj:"🔥",  pos:{l:16,b:52}, fly:true},
 {id:"dragonr",jp:"紅竜",        sprite:"unit_dragonr.png",base:8e9,   dmg:90000, iv:1.8, ranged:true,  proj:"🔥",  pos:{l:26,b:58}, fly:true},
 {id:"angel",  jp:"大天使",      sprite:"unit_angel.png",  base:40e9,  dmg:250000,iv:2.0, ranged:true,  proj:"✨",  pos:{l:3, b:60}, fly:true},
];

const HERO=[
 {id:"click",jp:"クリック強化",desc:"タップ/スペースキーのダメージを上げる",base:60,  scale:1.5, ef:o=>`クリックダメージ ${1+2*o} → ${1+2*(o+1)}`},
 {id:"gpk", jp:"コイン袋",desc:"ボス撃破時のゴールドが増える", base:120, scale:1.5, ef:o=>`撃破ボーナス +${20*(o+1)}%`},
 {id:"crate",jp:"クリティカル率",desc:"クリティカル発生率アップ（上限60%）",base:250, scale:1.6, max:28, ef:o=>`クリ率 ${Math.round(Math.min(60,5+2*o))}%`},
 {id:"cmult",jp:"クリティカル倍率",desc:"クリティカル時のダメージ倍率アップ",base:900,scale:1.7,ef:o=>`クリ倍率 ×${(2+0.3*o).toFixed(1)}`},
 {id:"gold", jp:"ゴールド獲得量",desc:"全てのゴールド獲得量アップ",base:500, scale:1.55,ef:o=>`ゴールド +${10*(o+1)}%`},
 {id:"combo",jp:"ゴールドラッシュ",desc:"タップごとに得られるゴールドが増える",base:1200,scale:1.65,ef:o=>`クリック時G +${5*(o+1)}%`},
];

let S;
function zeroUnits(){ const o={}; UNITS.forEach(u=>o[u.id]=0); return o; }
function freshState(){
 return { gold:0, globalWave:1, bossWave:1, prestige:0,
  clearedBossWave:0,
  owned:zeroUnits(),
  ulvl:zeroUnits(),
  hero:{click:0,gpk:0,crate:0,cmult:0,gold:0,combo:0},
  bossHpMax:0, bossHp:0 };
}
function load(){
 try{ const r=JSON.parse(localStorage.getItem("sbr_save2"));
   if(r){ S=Object.assign(freshState(),r);
     S.owned=Object.assign(zeroUnits(),r.owned||{});
     S.ulvl=Object.assign(zeroUnits(),r.ulvl||{});
     S.hero=Object.assign({click:0,gpk:0,crate:0,cmult:0,gold:0,combo:0},r.hero||{});
     if(!S.bossWave) S.bossWave=((S.globalWave-1)%BOSS.length)+1;
     if(!S.clearedBossWave) S.clearedBossWave=0;
     return; } }catch(e){}
 S=freshState();
}
function save(){ try{ localStorage.setItem("sbr_save2",JSON.stringify(S)); }catch(e){} }

function unitOwned(u){ return S.owned[u.id]>=1; }
function unitBuyCost(u){ return u.base; }
function unitUpgCost(u){ return Math.floor(u.base*1.8*Math.pow(1.38,S.ulvl[u.id])); }
function heroCost(h){ return Math.floor(h.base*Math.pow(h.scale,S.hero[h.id])); }
function unitDmg(u){ return u.dmg*(1+0.9*S.ulvl[u.id]); }
function unitDPS(u){ if(u.gold) return 0; return unitOwned(u)?unitDmg(u)/u.iv:0; }
function totalDPS(){ let d=0; UNITS.forEach(u=>d+=unitDPS(u)); return d; }
function clickDmg(){ return 1+2*S.hero.click; }
function critRate(){ return Math.min(0.6,0.05+0.02*S.hero.crate); }
function critMul(){ return 2+0.3*S.hero.cmult; }
function goldMul(){ return (1+0.1*S.hero.gold)*Math.pow(2,S.prestige); }

let bossIndex=0, bossDead=false;
function bossMaxHp(){ return 300*Math.pow(4,S.bossWave-1); }
function goldReward(){ return 80*Math.pow(2.8,S.bossWave-1)*goldMul()*(1+0.2*S.hero.gpk); }
function spawnBoss(reset){
 bossDead=false;
 bossIndex=(S.bossWave-1)%BOSS.length;
 const b=BOSS[bossIndex];
 S.bossHpMax=bossMaxHp();
 if(reset||!S.bossHp||S.bossHp>S.bossHpMax) S.bossHp=S.bossHpMax;
 bossImg.src="assets/"+b.img;
 bossEl.classList.toggle("wide",!!b.wide);
 $("#bossName").textContent=b.name;
 $("#bossLv").textContent=S.bossWave;
 bossEl.classList.remove("dying");
 updateBossBar(); updateStageTag();
}
function updateBossBar(){
 const p=Math.max(0,S.bossHp/S.bossHpMax*100);
 $("#hpfill").style.width=p+"%";
 $("#hptext").textContent=fmt(S.bossHp)+" / "+fmt(S.bossHpMax);
}
function updateStageTag(){
 $("#stStage").textContent=S.globalWave-1;
 $("#stWave").textContent="BOSS "+S.bossWave+"/11";
 $("#stPres").textContent=S.prestige>0?("転生 ×"+Math.pow(2,S.prestige)):"";
 const nb=$("#nextBossBtn");
 if(S.clearedBossWave>=S.bossWave){
   nb.style.display="block";
   nb.textContent=S.bossWave>=BOSS.length?"最初のボスへ ▶":"次のボスへ ▶";
 } else { nb.style.display="none"; }
 $("#prevBossBtn").style.display=S.bossWave>1?"block":"none";
}

function dealDamage(amt,x,y,kind,gold){
 if(bossDead) return;
 S.bossHp-=amt;
 floatDmg(amt,x,y,kind,gold);
 bossEl.classList.remove("hit"); void bossEl.offsetWidth; bossEl.classList.add("hit");
 if(S.bossHp<=0) killBoss();
 else updateBossBar();
}
function killBoss(){
 bossDead=true; S.bossHp=0; updateBossBar();
 const g=goldReward(); S.gold+=g;
 S.globalWave++;
 if(S.clearedBossWave<S.bossWave){
   S.clearedBossWave=S.bossWave;
   // first kill of this boss — progress milestone for analytics
   try{ gtag('event','boss_kill',{boss_wave:S.bossWave,boss_name:BOSS[bossIndex].name}); }catch(e){}
 }
 bossEl.classList.add("dying");
 sndKill();
 const r=bossEl.getBoundingClientRect(), fr=field.getBoundingClientRect();
 for(let i=0;i<14;i++) particle(r.left-fr.left+r.width/2, r.top-fr.top+r.height/2);
 floatDmg(g,72,16,"click",true);
 sndGold();
 // brief banner
 const kb=$("#killBanner"); $("#kbGold").textContent="+"+fmt(g)+" G";
 kb.classList.add("on");
 setTimeout(()=>kb.classList.remove("on"),1400);
 // auto-respawn same boss
 setTimeout(()=>{ spawnBoss(true); renderCards(); updateHud(); save(); }, 1500);
 updateStageTag(); save();
}

$("#nextBossBtn").addEventListener("click",()=>{
 S.bossWave=S.bossWave>=BOSS.length?1:S.bossWave+1;
 spawnBoss(true); renderCards(); updateHud(); save();
});
$("#prevBossBtn").addEventListener("click",()=>{
 if(S.bossWave<=1) return;
 S.bossWave--;
 spawnBoss(true); renderCards(); updateHud(); save();
});

const MAXDMG=28;
function floatDmg(amt,xPct,yPct,kind,gold){
 if(field.querySelectorAll(".dmg").length>MAXDMG) return;
 const d=document.createElement("div");
 d.className="dmg "+kind;
 d.textContent=(gold?"+"+fmt(amt)+"G":fmt(amt));
 if(gold) d.style.color="#f3c34a";
 d.style.left=xPct+"%"; d.style.top=yPct+"%";
 field.appendChild(d);
 setTimeout(()=>d.remove(),820);
}
function particle(x,y){
 const p=document.createElement("div"); p.className="particle";
 p.style.left=x+"px"; p.style.top=y+"px";
 const a=Math.random()*Math.PI*2, dist=rnd(20,70);
 p.animate([{transform:"translate(0,0)",opacity:1},
   {transform:`translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`,opacity:0}],
   {duration:600,easing:"ease-out"});
 field.appendChild(p); setTimeout(()=>p.remove(),600);
}
function spawnAtkFx(kind,xPct,yPct){
 const f=document.createElement("div");
 f.className="atk-fx "+kind;
 f.style.left=xPct+"%"; f.style.top=yPct+"%";
 field.appendChild(f);
 setTimeout(()=>f.remove(),500);
}
function projectile(fromX,fromY,emoji){
 if(field.querySelectorAll(".proj").length>30) return;
 const p=document.createElement("div"); p.className="proj"; p.textContent=emoji;
 p.style.left=fromX+"%"; p.style.top=fromY+"%";
 field.appendChild(p);
 const fr=field.getBoundingClientRect();
 // aim at the boss image's actual rendered centre rather than a fixed point
 const br=bossImg.getBoundingClientRect();
 let toXpct=82, toYpct=38;
 if(br.width&&fr.width){
   toXpct=(br.left-fr.left+br.width*0.5)/fr.width*100;
   toYpct=(br.top-fr.top+br.height*0.5)/fr.height*100;
 }
 const tx=(toXpct-fromX)/100*fr.width;
 const ty=(toYpct-fromY)/100*fr.height;
 p.animate([
   {transform:"translate(0,0)"},
   {transform:`translate(${tx*0.5}px,${ty*0.5-fr.height*0.06}px)`},
   {transform:`translate(${tx}px,${ty}px)`}
 ],{duration:380,easing:"linear"});
 setTimeout(()=>p.remove(),380);
}
// Anchor hit FX / damage numbers to the boss IMAGE's actual rendered box.
// Spawns within the central ~50% of the image rect, expressed as % of #field,
// so it matches every boss regardless of aspect ratio / transparent padding.
function bossHitPt(){
 const r=bossImg.getBoundingClientRect(), fr=field.getBoundingClientRect();
 if(!r.width||!fr.width) return {x:82, y:38};
 // central 50% band of the rect
 const cx=r.left-fr.left + r.width*rnd(0.25,0.75);
 const cy=r.top-fr.top  + r.height*rnd(0.25,0.75);
 return {x:cx/fr.width*100, y:cy/fr.height*100};
}

let combo=0, comboTimer=0;
function addCombo(){
 combo++; comboTimer=2;
 if(combo>=2){ $("#comboTag").classList.add("on"); $("#comboNum").textContent=combo;
   $("#comboMul").textContent=""; }
}

// gold granted per hit (clicks and unit attacks alike)
function hitGold(){ return Math.max(1,Math.floor(goldReward()*0.01*(1+0.05*(S.hero.combo+1)))); }

function spawnClickFx(xPct,yPct,crit){
 if(field.querySelectorAll(".clickfx").length>10) return;
 const f=document.createElement("div");
 f.className="clickfx"+(crit?" crit":"");
 f.style.left=xPct+"%"; f.style.top=yPct+"%";
 f.style.setProperty("--ang",Math.floor(rnd(0,360))+"deg");
 f.style.marginLeft=(crit?-65:-45)+"px"; f.style.marginTop=(crit?-65:-45)+"px";
 field.appendChild(f);
 setTimeout(()=>f.remove(),240);
}
function heroAttack(){
 if(bossDead) return;
 addCombo();
 let dmg=clickDmg(), crit=Math.random()<critRate();
 if(crit) dmg*=critMul();
 if(crit) sndCrit(); else sndClick();
 const pt=bossHitPt();
 spawnClickFx(pt.x,pt.y,crit);
 dealDamage(dmg, pt.x, pt.y, crit?"crit":"click");
 S.gold+=hitGold();
}
field.addEventListener("pointerdown",e=>{ heroAttack(); });
const _heldKeys=new Set();
window.addEventListener("keydown",e=>{
 if(e.code==="Space"||e.key===" "){
  e.preventDefault();
  if(_heldKeys.has("Space")) return;
  _heldKeys.add("Space");
  heroAttack();
 }
});
window.addEventListener("keyup",e=>{ if(e.code==="Space") _heldKeys.delete("Space"); });

/* ===== UNIT RENDERING ===== */
function renderUnits(){
 field.querySelectorAll(".unit-sprite").forEach(e=>e.remove());
 UNITS.forEach(u=>{
  if(!unitOwned(u)) return;
  const el=document.createElement("div");
  el.className="unit-sprite "+(u.ranged?"ranged":"melee")+(u.fly?" fly":"");
  el.dataset.type=u.id;
  el.style.left=u.pos.l+"%";
  el.style.bottom=u.pos.b+"%";
  if(u.fly){ const i=UNITS.indexOf(u);
    el.style.animationDelay=(-i*0.7)+"s";           /* negative: stagger without a start pause */
    el.style.animationDuration=(3+(i%4)*0.45)+"s"; } /* different speeds so they never sync */
  // drop "attacking" once its anim ends so the idle bob/float resumes
  el.addEventListener("animationend",e=>{ if(e.animationName==="lunge"||e.animationName==="rfire") el.classList.remove("attacking"); });
  el.innerHTML='<img src="assets/'+u.sprite+'"'+(u.flip?' style="transform:scaleX(-1)"':'')+' alt="">';
  // level badge
  if(S.ulvl[u.id]>0){
    const b=document.createElement("div"); b.className="badge";
    b.textContent="Lv."+S.ulvl[u.id]; el.appendChild(b);
  }
  field.appendChild(el);
 });
}

let lastT=performance.now();
const utimers={}; UNITS.forEach(u=>utimers[u.id]=u.iv);
function unitTick(dt){
 UNITS.forEach(u=>{
  if(S.owned[u.id]<=0) return;
  utimers[u.id]-=dt;
  if(utimers[u.id]<=0){ utimers[u.id]=u.iv; doUnitVolley(u); }
 });
}
function doUnitVolley(u){
 if(!unitOwned(u)) return;
 const sprites=field.querySelectorAll('.unit-sprite[data-type="'+u.id+'"]');
 if(u.gold){
   const g=hitGold()*(1+S.ulvl[u.id]); S.gold+=g;
   sprites.forEach(el=>{ el.classList.remove("attacking"); void el.offsetWidth; el.classList.add("attacking"); });
   if(sprites.length){
     const fr=field.getBoundingClientRect();
     const r=sprites[0].getBoundingClientRect();
     const gx=(r.left-fr.left+r.width/2)/fr.width*100, gy=(r.top-fr.top)/fr.height*100;
     floatDmg(g,gx,gy,"unit",true);
   }
   sndGold();
   return;
 }
 if(bossDead) return;
 const total=unitDmg(u);
 sndUnitHit();
 sprites.forEach(el=>{ el.classList.remove("attacking"); void el.offsetWidth; el.classList.add("attacking"); });
 if(u.ranged && sprites.length){
   const fr=field.getBoundingClientRect();
   const r=sprites[0].getBoundingClientRect();
   const fx=(r.left-fr.left)/fr.width*100, fy=(r.top-fr.top)/fr.height*100;
   projectile(fx,fy,u.proj);
 }
 const delay=u.ranged?370:100;
 setTimeout(()=>{
   if(bossDead) return;
   const pt=bossHitPt();
   if(u.fx) spawnAtkFx(u.fx,pt.x,pt.y);
   dealDamage(total,pt.x,pt.y,"unit");
   S.gold+=hitGold();
 },delay);
}

/* ===== CARDS ===== */
function card(o){
 const dis=o.maxed||S.gold<o.cost;
 return `<div class="card ${dis?'dis':''}" data-act="${o.act}" data-id="${o.id}" data-cost="${o.maxed?'Infinity':o.cost}">
   <div class="top"><span class="nm">${o.nm}</span><span class="lv">${o.lv}</span></div>
   ${o.desc?`<div class="desc">${o.desc}</div>`:''}
   <div class="ef">${o.ef}</div>
   <div class="cost">${o.maxed?'MAX':fmt(o.cost)+' G'}</div></div>`;
}
// re-evaluate affordability live so cards unlock the moment gold is enough
function refreshAffordable(){
 $$(".card").forEach(c=>c.classList.toggle("dis",S.gold<+c.dataset.cost));
}
function renderCards(){
 let h="";
 let prevOwned=true; // units unlock in order: next buy card appears only after previous unit is owned
 UNITS.forEach(u=>{
  if(unitOwned(u)){
   const ef=u.gold
     ? `収集 ${fmt(hitGold()*(1+S.ulvl[u.id]))}G → ${fmt(hitGold()*(2+S.ulvl[u.id]))}G (次)`
     : `DPS ${fmt(unitDPS(u))} → ${fmt(u.dmg*(1+0.9*(S.ulvl[u.id]+1))/u.iv)} (次)`;
   h+=card({act:"upg",id:u.id,nm:u.jp+" 強化",lv:"Lv."+S.ulvl[u.id],ef,cost:unitUpgCost(u)});
   prevOwned=true;
  } else if(prevOwned){
   h+=card({act:"buy",id:u.id,nm:u.jp,lv:"未召喚",
     ef:u.gold?`ゴールドを自動収集`:`DPS ${fmt(u.dmg/u.iv)} (初期)`,cost:unitBuyCost(u)});
   prevOwned=false;
  } else {
   prevOwned=false;
  }
 });
 $("#pane-summon").innerHTML=h;
 let hh="";
 HERO.forEach(o=>{ hh+=card({act:"hero",id:o.id,nm:o.jp,desc:o.desc,lv:"Lv."+S.hero[o.id],ef:o.ef(S.hero[o.id]),cost:heroCost(o),maxed:o.max&&S.hero[o.id]>=o.max}); });
 $("#pane-hero").innerHTML=hh;
 const pb=$("#prestigeBtn");
 if(S.bossWave>=7){ pb.disabled=false; pb.textContent=`転生する (永続ゴールド ×${Math.pow(2,S.prestige+1)})`; }
 else { pb.disabled=true; pb.textContent=`転生 (BOSS 7到達で解放) 現在 BOSS ${S.bossWave}`; }
}
$("#panels").addEventListener("click",e=>{
 const c=e.target.closest(".card"); if(!c||c.classList.contains("dis")) return;
 const act=c.dataset.act, id=c.dataset.id;
 if(act==="buy"){ const u=UNITS.find(x=>x.id===id), cst=unitBuyCost(u);
   if(S.gold>=cst && !unitOwned(u)){ S.gold-=cst; S.owned[id]=1; renderUnits(); sndLevelUp();
     try{ gtag('event','unit_buy',{unit_id:id,unit_name:u.jp}); }catch(e){} } }
 else if(act==="upg"){ const u=UNITS.find(x=>x.id===id), cst=unitUpgCost(u);
   if(S.gold>=cst){ S.gold-=cst; S.ulvl[id]++; renderUnits(); sndLevelUp(); } }
 else if(act==="hero"){ const o=HERO.find(x=>x.id===id), cst=heroCost(o);
   if(!(o.max&&S.hero[id]>=o.max) && S.gold>=cst){ S.gold-=cst; S.hero[id]++; sndLevelUp(); } }
 renderCards(); updateHud(); save();
});
$$(".tab").forEach(t=>t.addEventListener("click",()=>{
 $$(".tab").forEach(x=>x.classList.remove("active"));
 $$(".pane").forEach(x=>x.classList.remove("active"));
 t.classList.add("active");
 $("#pane-"+t.dataset.t).classList.add("active");
}));

$("#prestigeBtn").addEventListener("click",()=>{ if(!$("#prestigeBtn").disabled) $("#modal").classList.add("on"); });
$("#mNo").addEventListener("click",()=>$("#modal").classList.remove("on"));
$("#mYes").addEventListener("click",()=>{
 const p=S.prestige+1;
 try{ gtag('event','prestige',{prestige_count:p}); }catch(e){}
 S=freshState(); S.prestige=p;
 $("#modal").classList.remove("on");
 spawnBoss(true); renderUnits(); renderCards(); updateHud(); save();
});

function updateHud(){
 $("#goldBig").textContent=fmt(S.gold);
 let tot=0; UNITS.forEach(u=>{ if(unitOwned(u)) tot++; });
 $("#hUnits").textContent=tot;
 $("#hDps").textContent=fmt(totalDPS());
 $("#hGpm").textContent=fmt(gpmRate);
}

let gpmRate=0, gpmTimer=0, lastGold=0, gpmWindow=[];
function loop(now){
 const dt=Math.min(0.25,(now-lastT)/1000); lastT=now;
 if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0){ combo=0; $("#comboTag").classList.remove("on"); } }
 unitTick(dt);
 gpmTimer+=dt;
 if(gpmTimer>=1){ const earned=Math.max(0,S.gold-lastGold);
   gpmWindow.push(earned); if(gpmWindow.length>10) gpmWindow.shift();
   gpmRate=gpmWindow.reduce((a,b)=>a+b,0)/gpmWindow.length*60;
   lastGold=S.gold; gpmTimer=0; }
 updateHud();
 refreshAffordable();
 requestAnimationFrame(loop);
}

if(new URLSearchParams(location.search).has("reset")){
 try{ localStorage.removeItem("sbr_save2"); }catch(e){}
 history.replaceState(null,"",location.pathname);
}
load();
spawnBoss(); renderUnits(); renderCards(); updateHud();
lastGold=S.gold;
requestAnimationFrame(loop);

setInterval(save,10000);
document.addEventListener("visibilitychange",()=>{ if(document.hidden) save(); });
window.addEventListener("beforeunload",save);
</script>
</body>
