<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPACEBAR BOSS RUSH</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --panel:#161b21; --panel2:#1e252e; --line:#2c3742;
    --gold:#f3c34a; --txt:#d7e0e8; --sub:#8a99a8;
    --accent:#7fae6b;
  }
  html,body{ height:100%; }
  body{
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:#0c0f13; color:var(--txt); overflow:hidden; user-select:none;
    display:flex; flex-direction:column; height:100vh;
  }
  /* ===== BATTLEFIELD ===== */
  #field{
    position:relative; width:100%; height:62vh; overflow:hidden; cursor:crosshair;
    flex:0 0 auto;
  }
  .sky{position:absolute; inset:0;
    background:linear-gradient(#46525a 0%, #59656a 35%, #6e766c 62%, #7a7e68 80%, #83835f 100%);}
  .haze{position:absolute; left:0; right:0; bottom:30%; height:30%;
    background:linear-gradient(transparent,rgba(120,140,110,.25)); filter:blur(8px);}
  .cloud{position:absolute; background:radial-gradient(ellipse at center,rgba(235,240,235,.4),transparent 70%);
    border-radius:50%; pointer-events:none; animation:drift linear infinite;}
  @keyframes drift{ from{transform:translateX(-20vw);} to{transform:translateX(120vw);} }
  .layer{position:absolute; left:0; right:0; bottom:18%;}
  .mtn{height:42%; bottom:20%;
    background:linear-gradient(#2a3a3a,#1e2a28);
    clip-path:polygon(0 100%,0 60%,12% 30%,22% 55%,33% 20%,46% 50%,58% 25%,70% 55%,82% 28%,93% 50%,100% 35%,100% 100%);
    opacity:.65;}
  .mtn2{height:30%; bottom:20%;
    background:linear-gradient(#324036,#222d26);
    clip-path:polygon(0 100%,0 70%,15% 45%,28% 65%,40% 40%,55% 62%,68% 42%,80% 60%,92% 45%,100% 60%,100% 100%);
    opacity:.8;}
  .forest{height:13%; bottom:18%;
    background:linear-gradient(#1f2b20,#18221a);
    clip-path:polygon(0 100%,0 55%,3% 30%,6% 60%,9% 25%,12% 55%,16% 35%,19% 65%,23% 28%,26% 58%,30% 32%,33% 62%,37% 26%,40% 56%,44% 34%,47% 64%,51% 30%,54% 58%,58% 24%,61% 56%,65% 36%,68% 64%,72% 28%,75% 56%,79% 32%,82% 62%,86% 26%,89% 58%,93% 34%,96% 60%,100% 30%,100% 100%);
    opacity:.9;}
  .ground{position:absolute; left:0; right:0; bottom:0; height:18%;
    background:linear-gradient(#3c4530,#272d1f); border-top:2px solid #4d5a3d;
    box-shadow:inset 0 8px 18px rgba(0,0,0,.4);}
  .ground::after{content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(78deg,rgba(0,0,0,.12) 0 18px,transparent 18px 40px);}
  .groundline{position:absolute; left:0; right:0; bottom:18%; height:3px; background:rgba(0,0,0,.25);}

  /* ===== BOSS ===== */
  #boss{position:absolute; right:10%; bottom:16%; height:46%; max-width:42%; transform-origin:bottom center;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.5)); z-index:5; pointer-events:none;}
  #boss img{height:100%; width:auto; max-width:100%; object-fit:contain; object-position:bottom; display:block; animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-2.5%) rotate(-.6deg);} }
  #boss.hit img{ animation:bob 2.6s ease-in-out infinite, shake .18s; filter:brightness(3) contrast(.3); }
  @keyframes shake{ 0%{transform:translate(0,0);}25%{transform:translate(-7px,2px);}50%{transform:translate(6px,-1px);}75%{transform:translate(-4px,1px);}100%{transform:translate(0,0);} }
  #boss.dying img{ animation:die .7s forwards; }
  @keyframes die{ to{ transform:translateY(10%) rotate(14deg) scale(.85); opacity:0; filter:saturate(0) brightness(.4);} }

  #bossPlate{position:absolute; top:5%; left:50%; transform:translateX(-50%); width:min(440px,72%); z-index:8;
    text-align:center; pointer-events:none;}
  #bossName{font-size:clamp(14px,2.4vw,20px); font-weight:700; letter-spacing:.04em;
    text-shadow:0 2px 4px #000,0 0 8px rgba(0,0,0,.7); color:#f0e6d2;}
  #bossSub{font-size:11px; color:var(--sub); margin-bottom:4px;}
  .hpwrap{height:16px; border:2px solid #5a4636; border-radius:9px; background:#1a120c;
    box-shadow:inset 0 1px 3px #000, 0 1px 2px rgba(0,0,0,.5); overflow:hidden; position:relative;}
  #hpfill{height:100%; width:100%;
    background:linear-gradient(#e8584a,#9c1f1f); transition:width .18s linear;}
  #hptext{position:absolute; inset:0; font-size:10px; line-height:14px; font-weight:600;
    text-shadow:0 1px 2px #000; color:#fff;}

  /* ===== UNITS ===== */
  #units{position:absolute; left:0; bottom:16%; height:40%; width:62%; z-index:4; pointer-events:none;}
  .squad{position:absolute; bottom:0; display:flex; align-items:flex-end; gap:3px;}
  .badge{position:absolute; top:-14px; right:-6px; font-size:10px; font-weight:700; color:#fff;
    background:rgba(0,0,0,.55); border:1px solid var(--line); border-radius:8px; padding:0 5px;}
  .unit{position:relative; width:30px; height:58px; transform-origin:bottom center;
    animation:ubob 1.4s ease-in-out infinite;}
  .unit .body{position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:20px; height:34px; background:#10140f; border-radius:8px 8px 5px 5px;}
  .unit .head{position:absolute; bottom:31px; left:50%; transform:translateX(-50%);
    width:15px; height:15px; background:#10140f; border-radius:50%;}
  .unit .arm{position:absolute; bottom:17px; left:50%; width:19px; height:5px; background:#10140f;
    transform-origin:left center; border-radius:3px;}
  .unit.attacking{ animation:lunge .3s ease; }
  @keyframes lunge{ 0%{transform:translateX(0);}40%{transform:translateX(10px) scaleX(1.1);}100%{transform:translateX(0);} }
  @keyframes ubob{ 0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);} }
  .u-sword .arm{background:#9aa0a8;} .u-arch .body{background:#1c2a16;}
  .u-mage .head{background:#3a2a55;} .u-mage .body{background:#241834;}
  .u-bers .body{background:#2a1212;} .u-bers .arm{background:#c14040;}
  .u-drag .body{background:#142a2a;} .u-drag .head{background:#1c4a44;}

  .proj{position:absolute; z-index:6; font-size:14px; pointer-events:none; will-change:transform;}

  .dmg{position:absolute; z-index:9; font-weight:800; pointer-events:none;
    text-shadow:0 1px 2px #000,0 0 4px rgba(0,0,0,.6); animation:flo .8s ease-out forwards; white-space:nowrap;}
  @keyframes flo{ 0%{transform:translate(-50%,0) scale(.6); opacity:0;}
    20%{transform:translate(-50%,-14px) scale(1.1); opacity:1;}
    100%{transform:translate(-50%,-52px) scale(1); opacity:0;} }
  .dmg.click{color:#ffe14a; font-size:22px;} .dmg.crit{color:#ff5a4a; font-size:26px;}
  .dmg.unit{color:#e8eef2; font-size:13px;}
  .particle{position:absolute; z-index:7; width:6px; height:6px; border-radius:50%;
    background:var(--gold); pointer-events:none;}

  /* ===== HUD ===== */
  #hud{position:absolute; top:10px; left:10px; z-index:10;
    background:rgba(14,18,22,.82); border:1px solid var(--line); border-radius:10px;
    padding:8px 12px; font-size:12px; backdrop-filter:blur(3px); min-width:150px;}
  #hud .row{display:flex; justify-content:space-between; gap:14px; padding:1px 0;}
  #hud .k{color:var(--sub);} #hud .v{font-weight:700;}
  #goldBig{color:var(--gold); font-size:16px;}
  #stageTag{position:absolute; top:10px; right:10px; z-index:10; text-align:right;
    background:rgba(14,18,22,.82); border:1px solid var(--line); border-radius:10px; padding:6px 12px; font-size:12px;}
  #stageTag b{font-size:16px; color:var(--accent);}
  #comboTag{position:absolute; top:48%; left:14px; z-index:10; transform:translateY(-50%);
    font-weight:800; font-size:clamp(18px,4vw,34px); color:#ffd24a; text-shadow:0 2px 6px #000;
    opacity:0; transition:opacity .2s;}
  #comboTag.on{opacity:1;}
  #comboTag small{display:block; font-size:11px; color:var(--sub);}

  /* ===== CONTROL DECK ===== */
  #deck{flex:1 1 auto; display:flex; flex-direction:column; background:var(--panel); border-top:2px solid var(--line); min-height:0;}
  #tabs{display:flex; flex:0 0 auto;}
  .tab{flex:1; padding:10px; text-align:center; font-weight:700; font-size:14px; cursor:pointer;
    background:var(--panel2); color:var(--sub); border-right:1px solid var(--line); border-bottom:2px solid transparent;}
  .tab.active{color:var(--txt); background:var(--panel); border-bottom-color:var(--accent);}
  #panels{flex:1 1 auto; overflow-y:auto; padding:10px; min-height:0;}
  .pane{display:none; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:8px;}
  .pane.active{display:grid;}
  .card{background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 11px;
    cursor:pointer; transition:.1s; display:flex; flex-direction:column; gap:3px;}
  .card:not(.dis):hover{border-color:var(--accent); transform:translateY(-1px);}
  .card.dis{opacity:.5; cursor:not-allowed;}
  .card .top{display:flex; justify-content:space-between; align-items:baseline;}
  .card .nm{font-weight:700; font-size:14px;}
  .card .lv{font-size:11px; color:var(--accent); font-weight:700;}
  .card .ef{font-size:11px; color:var(--sub);}
  .card .cost{font-size:13px; font-weight:700; color:var(--gold); margin-top:2px;}
  .card.dis .cost{color:#a06a4a;}
  #prestigeBtn{margin:6px; padding:9px; background:#3a2150; color:#e7d6ff; border:1px solid #6a4a90;
    border-radius:8px; font-weight:700; cursor:pointer; font-size:13px;}
  #prestigeBtn:disabled{opacity:.45; cursor:not-allowed;}

  #modal{position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:50; display:none;
    align-items:center; justify-content:center;}
  #modal.on{display:flex;}
  .mbox{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; max-width:340px; text-align:center;}
  .mbox h3{margin-bottom:8px; color:#e7d6ff;}
  .mbox p{font-size:13px; color:var(--sub); margin-bottom:16px; line-height:1.5;}
  .mbox button{padding:9px 18px; margin:0 5px; border-radius:8px; border:none; font-weight:700; cursor:pointer;}
  .mbox .yes{background:#7a4ab0; color:#fff;} .mbox .no{background:var(--panel2); color:var(--txt); border:1px solid var(--line);}

  @media(max-width:680px){
    #field{height:50vh;} .pane{grid-template-columns:1fr;}
    #hud{font-size:11px; min-width:120px;} #units{width:55%;}
  }
</style>
</head>
<body>
<div id="field">
  <div class="sky"></div>
  <div class="cloud" style="top:8%;left:0;width:24vw;height:9vh;animation-duration:60s;"></div>
  <div class="cloud" style="top:18%;left:0;width:18vw;height:7vh;animation-duration:85s;animation-delay:-30s;"></div>
  <div class="cloud" style="top:4%;left:0;width:30vw;height:11vh;animation-duration:110s;animation-delay:-70s;"></div>
  <div class="layer mtn"></div>
  <div class="layer mtn2"></div>
  <div class="haze"></div>
  <div class="layer forest"></div>
  <div class="ground"></div>
  <div class="groundline"></div>

  <div id="hud">
    <div class="row"><span class="k">ゴールド</span><span class="v" id="goldBig">0</span></div>
    <div class="row"><span class="k">ユニット</span><span class="v" id="hUnits">0</span></div>
    <div class="row"><span class="k">G/分</span><span class="v" id="hGpm">0</span></div>
    <div class="row"><span class="k">DPS</span><span class="v" id="hDps">0</span></div>
  </div>
  <div id="stageTag">ステージ <b id="stStage">1</b><br><span id="stWave">WAVE 1/10</span>
    <br><span style="color:var(--sub)" id="stPres"></span></div>
  <div id="comboTag"><span id="comboNum">0</span> COMBO<small id="comboMul">×1.0</small></div>

  <div id="bossPlate">
    <div id="bossSub">威信 LV.<span id="bossLv">1</span></div>
    <div id="bossName">下水の魔鼠 ラトキン</div>
    <div class="hpwrap"><div id="hpfill"></div><div id="hptext">0/0</div></div>
  </div>

  <div id="units"></div>
  <div id="boss"><img id="bossImg" alt="boss" src="assets/boss01_rat.webp"></div>
</div>

<div id="deck">
  <div id="tabs">
    <div class="tab active" data-t="summon">召喚</div>
    <div class="tab" data-t="hero">強化</div>
  </div>
  <div id="panels">
    <div class="pane active" id="pane-summon"></div>
    <div class="pane" id="pane-hero"></div>
  </div>
  <button id="prestigeBtn" disabled>転生 (グローバルWAVE50で解放)</button>
</div>

<div id="modal"><div class="mbox">
  <h3>転生しますか？</h3>
  <p>全ての進行（ゴールド・ユニット・強化・ステージ）をリセットし、永続的にゴールド獲得 ×2 を得ます。</p>
  <button class="yes" id="mYes">転生する</button>
  <button class="no" id="mNo">やめる</button>
</div></div>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const field=$("#field"), unitsEl=$("#units"), bossEl=$("#boss"), bossImg=$("#bossImg");
function fmt(n){ n=Math.floor(n);
  const u=["","K","M","B","T","Qa","Qi"]; let i=0;
  while(n>=1000&&i<u.length-1){ n/=1000; i++; }
  return (i===0?n:(n<10?n.toFixed(2):n<100?n.toFixed(1):Math.floor(n)))+u[i];
}
function rnd(a,b){return a+Math.random()*(b-a);}

const BOSS=[
 {img:"boss01_rat.webp",name:"下水の魔鼠 ラトキン"},
 {img:"boss02_nightwing.webp",name:"夜翼の影 ノクターン"},
 {img:"boss03_direbird.webp",name:"凶鳥 ザルファク"},
 {img:"boss04_blob.webp",name:"蠢く粘塊 グロブス"},
 {img:"boss05_hunter.webp",name:"深淵の狩人 ヴォルグ"},
 {img:"boss06_flame.webp",name:"焔霊 イグニス"},
 {img:"boss07_skyfiend.webp",name:"天空の鬼神 アエロス"},
 {img:"boss08_hound.webp",name:"時喰いの猟犬 クロノファング"},
 {img:"boss09_beast.webp",name:"極北の獣神 ボレアス"},
 {img:"boss10_stormgod.webp",name:"嵐の古神 ストラトス"},
 {img:"boss11_eldermind.webp",name:"刻の支配者 エルダーマインド"},
];

const UNITS=[
 {id:"sword",jp:"剣士",cls:"u-sword",base:15,   dmg:3,    iv:0.8, ranged:false},
 {id:"arch", jp:"弓兵",cls:"u-arch", base:120,  dmg:14,   iv:1.1, ranged:true, proj:"➳"},
 {id:"mage", jp:"魔導士",cls:"u-mage",base:1100, dmg:120,  iv:2.0, ranged:true, proj:"✦"},
 {id:"bers", jp:"狂戦士",cls:"u-bers",base:13000,dmg:600,  iv:0.55,ranged:false},
 {id:"drag", jp:"竜騎士",cls:"u-drag",base:160000,dmg:9000,iv:1.6, ranged:true, proj:"🔥"},
];

const HERO=[
 {id:"click",jp:"クリック強化",base:50,  scale:1.5, ef:o=>`クリックダメージ +${5*o}`},
 {id:"crate",jp:"クリティカル率",base:300, scale:1.6, ef:o=>`クリ率 ${Math.round(Math.min(60,5+2*o))}%`},
 {id:"cmult",jp:"クリティカル倍率",base:800,scale:1.7,ef:o=>`クリ倍率 ×${(2+0.3*o).toFixed(1)}`},
 {id:"gold", jp:"ゴールド獲得量",base:500, scale:1.55,ef:o=>`ゴールド +${10*o}%`},
 {id:"combo",jp:"コンボマスタリー",base:1200,scale:1.65,ef:o=>`コンボ強化 +${10*o}%`},
];

let S;
function freshState(){
 return { gold:0, globalWave:1, prestige:0,
  owned:{sword:0,arch:0,mage:0,bers:0,drag:0},
  ulvl:{sword:0,arch:0,mage:0,bers:0,drag:0},
  hero:{click:0,crate:0,cmult:0,gold:0,combo:0},
  bossHpMax:0, bossHp:0 };
}
function load(){
 try{ const r=JSON.parse(localStorage.getItem("sbr_save2"));
   if(r){ S=Object.assign(freshState(),r);
     S.owned=Object.assign({sword:0,arch:0,mage:0,bers:0,drag:0},r.owned||{});
     S.ulvl=Object.assign({sword:0,arch:0,mage:0,bers:0,drag:0},r.ulvl||{});
     S.hero=Object.assign({click:0,crate:0,cmult:0,gold:0,combo:0},r.hero||{});
     return; } }catch(e){}
 S=freshState();
}
function save(){ try{ localStorage.setItem("sbr_save2",JSON.stringify(S)); }catch(e){} }

function unitCost(u){ return Math.floor(u.base*Math.pow(1.25,S.owned[u.id])); }
function ulvlCost(u){ return Math.floor(u.base*4*Math.pow(1.35,S.ulvl[u.id])); }
function heroCost(h){ return Math.floor(h.base*Math.pow(h.scale,S.hero[h.id])); }
function unitDmg(u){ return u.dmg*(1+0.5*S.ulvl[u.id]); }
function unitDPS(u){ return S.owned[u.id]*unitDmg(u)/u.iv; }
function totalDPS(){ let d=0; UNITS.forEach(u=>d+=unitDPS(u)); return d; }
function comboMul(){ const tiers=Math.floor(combo/10); return 1+tiers*(0.15*(1+0.1*S.hero.combo)); }
function clickDmg(){ return (5+5*S.hero.click)*(1+0.04*combo)*comboMul(); }
function critRate(){ return Math.min(0.6,0.05+0.02*S.hero.crate); }
function critMul(){ return 2+0.3*S.hero.cmult; }
function goldMul(){ return (1+0.1*S.hero.gold)*Math.pow(2,S.prestige); }

let bossIndex=0, bossDead=false;
function bossMaxHp(){ return 80*Math.pow(1.22,S.globalWave-1); }
function goldReward(){ return 12*Math.pow(1.16,S.globalWave-1)*goldMul(); }
function waveInStage(){ return ((S.globalWave-1)%10)+1; }
function stageNum(){ return Math.floor((S.globalWave-1)/10)+1; }
function spawnBoss(){
 bossDead=false;
 bossIndex=(S.globalWave-1)%BOSS.length;
 const b=BOSS[bossIndex];
 S.bossHpMax=bossMaxHp();
 if(!S.bossHp||S.bossHp>S.bossHpMax) S.bossHp=S.bossHpMax;
 bossImg.src="assets/"+b.img;
 $("#bossName").textContent=b.name;
 $("#bossLv").textContent=S.globalWave;
 bossEl.classList.remove("dying");
 updateBossBar(); updateStageTag();
}
function updateBossBar(){
 const p=Math.max(0,S.bossHp/S.bossHpMax*100);
 $("#hpfill").style.width=p+"%";
 $("#hptext").textContent=fmt(S.bossHp)+" / "+fmt(S.bossHpMax);
}
function updateStageTag(){
 $("#stStage").textContent=stageNum();
 $("#stWave").textContent="WAVE "+waveInStage()+"/10";
 $("#stPres").textContent=S.prestige>0?("転生 ×"+Math.pow(2,S.prestige)):"";
}

function dealDamage(amt,x,y,kind,gold){
 if(bossDead) return;
 S.bossHp-=amt;
 floatDmg(amt,x,y,kind,gold);
 bossEl.classList.remove("hit"); void bossEl.offsetWidth; bossEl.classList.add("hit");
 if(S.bossHp<=0) killBoss();
 else updateBossBar();
}
function killBoss(){
 bossDead=true; S.bossHp=0; updateBossBar();
 const g=goldReward(); S.gold+=g;
 bossEl.classList.add("dying");
 const r=bossEl.getBoundingClientRect(), fr=field.getBoundingClientRect();
 for(let i=0;i<14;i++) particle(r.left-fr.left+r.width/2, r.top-fr.top+r.height/2);
 floatDmg(g,72,16,"click",true);
 setTimeout(()=>{ S.globalWave++; spawnBoss(); renderCards(); }, 720);
 save();
}

const MAXDMG=28;
function floatDmg(amt,xPct,yPct,kind,gold){
 if(field.querySelectorAll(".dmg").length>MAXDMG) return;
 const d=document.createElement("div");
 d.className="dmg "+kind;
 d.textContent=(gold?"+"+fmt(amt)+"G":fmt(amt));
 if(gold) d.style.color="#f3c34a";
 d.style.left=xPct+"%"; d.style.top=yPct+"%";
 field.appendChild(d);
 setTimeout(()=>d.remove(),820);
}
function particle(x,y){
 const p=document.createElement("div"); p.className="particle";
 p.style.left=x+"px"; p.style.top=y+"px";
 const a=Math.random()*Math.PI*2, dist=rnd(20,70);
 p.animate([{transform:"translate(0,0)",opacity:1},
   {transform:`translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`,opacity:0}],
   {duration:600,easing:"ease-out"});
 field.appendChild(p); setTimeout(()=>p.remove(),600);
}
function projectile(fromX,fromY,emoji){
 if(field.querySelectorAll(".proj").length>30) return;
 const p=document.createElement("div"); p.className="proj"; p.textContent=emoji;
 p.style.left=fromX+"%"; p.style.top=fromY+"%";
 field.appendChild(p);
 const tx=(86-fromX), ty=(22-fromY);
 p.animate([{transform:"translate(0,0)"},{transform:`translate(${tx}vw,${ty}vh)`}],
   {duration:380,easing:"linear"});
 setTimeout(()=>p.remove(),380);
}
function bossHitPt(){ return {x:rnd(78,90), y:rnd(16,40)}; }

let combo=0, comboTimer=0;
function addCombo(){
 combo++; comboTimer=2;
 const t=$("#comboTag");
 if(combo>=2){ t.classList.add("on"); $("#comboNum").textContent=combo;
   $("#comboMul").textContent="×"+comboMul().toFixed(1); }
}

function heroAttack(){
 if(bossDead) return;
 addCombo();
 let dmg=clickDmg(), crit=Math.random()<critRate();
 if(crit) dmg*=critMul();
 const pt=bossHitPt();
 dealDamage(dmg, pt.x, pt.y, crit?"crit":"click");
 S.gold+=Math.max(1,Math.floor(goldReward()*0.01));
 unitsEl.querySelectorAll(".unit").forEach(u=>{ u.classList.remove("attacking"); void u.offsetWidth; u.classList.add("attacking"); });
}
field.addEventListener("pointerdown",()=>heroAttack());
window.addEventListener("keydown",e=>{
 if(e.code==="Space"||e.key===" "){ e.preventDefault(); heroAttack(); }
});

const VISCAP=8;
function renderUnits(){
 unitsEl.innerHTML="";
 let laneX=4;
 UNITS.forEach(u=>{
  const n=S.owned[u.id]; if(n<=0) return;
  const show=Math.min(n,VISCAP);
  const sq=document.createElement("div"); sq.className="squad";
  sq.style.left=laneX+"%"; sq.dataset.type=u.id;
  for(let i=0;i<show;i++){
   const el=document.createElement("div"); el.className="unit "+u.cls;
   el.style.animationDelay=(i*0.13)+"s";
   el.innerHTML='<div class="head"></div><div class="body"></div><div class="arm"></div>';
   sq.appendChild(el);
  }
  if(n>VISCAP){ const b=document.createElement("div"); b.className="badge"; b.textContent="×"+n; sq.appendChild(b); }
  unitsEl.appendChild(sq);
  laneX+=10;
 });
}

let lastT=performance.now();
const utimers={}; UNITS.forEach(u=>utimers[u.id]=u.iv);
function unitTick(dt){
 UNITS.forEach(u=>{
  if(S.owned[u.id]<=0) return;
  utimers[u.id]-=dt;
  if(utimers[u.id]<=0){ utimers[u.id]=u.iv; doUnitVolley(u); }
 });
}
function doUnitVolley(u){
 if(bossDead) return;
 const sq=unitsEl.querySelector('.squad[data-type="'+u.id+'"]');
 const total=S.owned[u.id]*unitDmg(u);
 if(sq){
  const us=sq.querySelectorAll(".unit");
  us.forEach((el,i)=>{ if(i<4){ el.classList.remove("attacking"); setTimeout(()=>el.classList.add("attacking"),i*40); } });
  if(u.ranged){
    const r=sq.getBoundingClientRect(), fr=field.getBoundingClientRect();
    const fx=(r.left-fr.left)/fr.width*100, fy=(r.top-fr.top)/fr.height*100+10;
    projectile(fx,fy,u.proj);
  }
 }
 const delay=u.ranged?360:120;
 setTimeout(()=>{ if(bossDead) return; const pt=bossHitPt(); dealDamage(total,pt.x,pt.y,"unit"); },delay);
}

function card(o){
 const dis=S.gold<o.cost;
 return `<div class="card ${dis?'dis':''}" data-act="${o.act}" data-id="${o.id}">
   <div class="top"><span class="nm">${o.nm}</span><span class="lv">${o.lv}</span></div>
   <div class="ef">${o.ef}</div>
   <div class="cost">${fmt(o.cost)} G</div></div>`;
}
function renderCards(){
 let h="";
 UNITS.forEach(u=>{
  h+=card({act:"buy",id:u.id,nm:u.jp,lv:"所持 "+S.owned[u.id],
    ef:`単体DPS ${fmt(unitDmg(u)/u.iv)} ・ 合計 ${fmt(unitDPS(u))}`,cost:unitCost(u)});
  h+=card({act:"ulvl",id:u.id,nm:u.jp+" 鍛錬",lv:"Lv."+S.ulvl[u.id],
    ef:`ダメージ +${50*(S.ulvl[u.id]+1)}% (次)`,cost:ulvlCost(u)});
 });
 $("#pane-summon").innerHTML=h;
 let hh="";
 HERO.forEach(o=>{ hh+=card({act:"hero",id:o.id,nm:o.jp,lv:"Lv."+S.hero[o.id],ef:o.ef(S.hero[o.id]),cost:heroCost(o)}); });
 $("#pane-hero").innerHTML=hh;
 const pb=$("#prestigeBtn");
 if(S.globalWave>=50){ pb.disabled=false; pb.textContent=`転生する (永続 ×${Math.pow(2,S.prestige+1)} ゴールド)`; }
 else { pb.disabled=true; pb.textContent=`転生 (WAVE50で解放) 現在 ${S.globalWave}`; }
}
$("#panels").addEventListener("click",e=>{
 const c=e.target.closest(".card"); if(!c||c.classList.contains("dis")) return;
 const act=c.dataset.act, id=c.dataset.id;
 if(act==="buy"){ const u=UNITS.find(x=>x.id===id), cst=unitCost(u);
   if(S.gold>=cst){ S.gold-=cst; S.owned[id]++; renderUnits(); } }
 else if(act==="ulvl"){ const u=UNITS.find(x=>x.id===id), cst=ulvlCost(u);
   if(S.gold>=cst){ S.gold-=cst; S.ulvl[id]++; } }
 else if(act==="hero"){ const o=HERO.find(x=>x.id===id), cst=heroCost(o);
   if(S.gold>=cst){ S.gold-=cst; S.hero[id]++; } }
 renderCards(); updateHud(); save();
});
$$(".tab").forEach(t=>t.addEventListener("click",()=>{
 $$(".tab").forEach(x=>x.classList.remove("active"));
 $$(".pane").forEach(x=>x.classList.remove("active"));
 t.classList.add("active");
 $("#pane-"+t.dataset.t).classList.add("active");
}));

$("#prestigeBtn").addEventListener("click",()=>{ if(!$("#prestigeBtn").disabled) $("#modal").classList.add("on"); });
$("#mNo").addEventListener("click",()=>$("#modal").classList.remove("on"));
$("#mYes").addEventListener("click",()=>{
 const p=S.prestige+1; S=freshState(); S.prestige=p;
 $("#modal").classList.remove("on");
 spawnBoss(); renderUnits(); renderCards(); updateHud(); save();
});

function updateHud(){
 $("#goldBig").textContent=fmt(S.gold);
 let tot=0; UNITS.forEach(u=>tot+=S.owned[u.id]);
 $("#hUnits").textContent=tot;
 $("#hDps").textContent=fmt(totalDPS());
 $("#hGpm").textContent=fmt(gpmRate);
}

let gpmRate=0, gpmTimer=0, lastGold=0, gpmWindow=[];
function loop(now){
 const dt=Math.min(0.25,(now-lastT)/1000); lastT=now;
 if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0){ combo=0; $("#comboTag").classList.remove("on"); } }
 unitTick(dt);
 gpmTimer+=dt;
 if(gpmTimer>=1){ const earned=Math.max(0,S.gold-lastGold);
   gpmWindow.push(earned); if(gpmWindow.length>10) gpmWindow.shift();
   gpmRate=gpmWindow.reduce((a,b)=>a+b,0)/gpmWindow.length*60;
   lastGold=S.gold; gpmTimer=0; }
 updateHud();
 requestAnimationFrame(loop);
}

load();
spawnBoss(); renderUnits(); renderCards(); updateHud();
lastGold=S.gold;
requestAnimationFrame(loop);

setInterval(save,10000);
document.addEventListener("visibilitychange",()=>{ if(document.hidden) save(); });
window.addEventListener("beforeunload",save);
</script>
</body>
</html>
